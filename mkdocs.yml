site_name: PortSwigger Writeups
site_description: My PortSwigger Web Security Academy writeups
site_author: Thanh Dat Hoang

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: Portswigger.md
  - Server-side:
      - Access Control: Portswigger/Access control vulnerabilities.md
      - Authentication: Portswigger/Authentication vulnerabilities.md
      - Business Logic: Portswigger/Business logic vulnerabilities.md
      - File Upload: Portswigger/File upload vulnerabilities.md
      - Information Disclosure: Portswigger/Information disclosure.md
      - Insecure Deserialization: Portswigger/Insecure deserialize.md
      - NoSQL Injection: Portswigger/NoSQL injection.md
      - OS Command Injection: Portswigger/OS command injection.md
      - Path Traversal: Portswigger/Path traversal.md
      - Race Condition: Portswigger/Race condition.md
      - SSTI: Portswigger/Server side template injection.md
      - SQL Injection: Portswigger/SQL injection.md
      - SSRF: Portswigger/SSRF.md
      - Web Cache Poisoning: Portswigger/Web cache poisoning.md
      - WebSocket: Portswigger/Web socket.md
      - XXE Injection: Portswigger/XML external entity (XXE) injection.md
  - Client-side:
      - Clickjacking: Portswigger/Clickjacking.md
      - CORS: Portswigger/CORS.md
      - CSRF: Portswigger/CSRF.md
      - DOM-based Vulnerabilities: Portswigger/DOM-based vulnerabilities.md
      - JWT Attack: Portswigger/JWT attack.md
      - OAuth: Portswigger/Oauth.md
      - Prototype Pollution: Portswigger/Prototype polution.md
      - XSS: Portswigger/XSS.md
  - API:
      - GraphQL: Portswigger/GraphQL.md

markdown_extensions:
  - admonition
  - tables
  - fenced_code
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.details

plugins:
  - search